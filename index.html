<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rulebook — Board Game Reference</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0b0b;
      --surface:  #141414;
      --border:   #222;
      --text:     #ddd8ce;
      --muted:    #5a5650;
      --gold:     #b8934a;
      --gap:      6px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--border);
    }

    .site-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
    }

    .site-name span {
      color: var(--gold);
    }

    .site-tagline {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Mosaic grid ─────────────────────────────────── */
    .mosaic {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-auto-rows: 180px;
      gap: var(--gap);
      padding: var(--gap);
    }

    /* Tile size presets */
    .tile-wide   { grid-column: span 8; grid-row: span 2; }
    .tile-tall   { grid-column: span 4; grid-row: span 2; }
    .tile-medium { grid-column: span 6; grid-row: span 2; }

    .tile {
      position: relative;
      overflow: hidden;
      display: block;
      text-decoration: none;
      background: var(--surface);
      cursor: pointer;
    }

    /* Box-art image fills tile */
    .tile-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  filter 0.55s ease;
      filter: brightness(0.88) saturate(0.9);
    }

    /* Fallback placeholder when using CSS art */
    .tile-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Hover overlay */
    .tile-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.82) 0%,
        rgba(0,0,0,0.3)  40%,
        transparent      70%
      );
      opacity: 0;
      transition: opacity 0.4s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 24px 22px;
    }

    .tile:hover .tile-overlay { opacity: 1; }

    .tile:hover .tile-img {
      transform: scale(1.04);
      filter: brightness(0.75) saturate(1.1);
    }

    .tile-label {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.1rem, 2vw, 1.6rem);
      letter-spacing: 0.06em;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 6px;
      transform: translateY(6px);
      transition: transform 0.35s ease 0.05s;
    }

    .tile:hover .tile-label { transform: translateY(0); }

    .tile-sub {
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s ease 0.12s, transform 0.3s ease 0.12s;
    }

    .tile:hover .tile-sub { opacity: 1; transform: translateY(0); }

    /* Corner badge (always visible) */
    .tile-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 0.55rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(184,147,74,0.35);
      padding: 4px 8px;
      backdrop-filter: blur(4px);
    }

    /* ── Footer ─────────────────────────────────────── */
    footer {
      padding: 28px 32px;
      border-top: 1px solid var(--border);
      margin-top: var(--gap);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer p {
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    footer a {
      color: var(--gold);
      text-decoration: none;
    }

    /* Staggered entrance animation */
    .tile {
      animation: tileIn 0.6s ease both;
    }
    .tile:nth-child(1) { animation-delay: 0.05s; }
    .tile:nth-child(2) { animation-delay: 0.15s; }
    .tile:nth-child(3) { animation-delay: 0.25s; }

    @keyframes tileIn {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 600px) {
      .mosaic {
        grid-template-columns: 1fr;
        grid-auto-rows: 240px;
      }

      .tile-wide,
      .tile-tall,
      .tile-medium {
        grid-column: span 1;
        grid-row: span 1;
      }

      /* Always show overlay on touch devices (no hover) */
      .tile-overlay { opacity: 1; }
      .tile-label   { transform: translateY(0); }
      .tile-sub     { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <div class="site-name">Rule<span>book</span></div>
    <div class="site-tagline">Board Game Quick Reference</div>
  </header>

  <main class="mosaic">

    <!-- Ark Nova -->
    <a href="ark-nova-rules-reference.html" class="tile tile-tall">
      <img class="tile-img" src="images/ark-nova.png" alt="Ark Nova" />
      <div class="tile-badge">Engine · 1–4 Players</div>
      <div class="tile-overlay">
        <div class="tile-label">Ark Nova</div>
        <div class="tile-sub">View Rules →</div>
      </div>
    </a>

    <!-- Flamme Rouge -->
    <a href="flamme-rouge-rules-reference.html" class="tile tile-tall">
      <img class="tile-img" src="images/flamme-rouge.png" alt="Flamme Rouge" />
      <div class="tile-badge">Racing · 2–4 Players</div>
      <div class="tile-overlay">
        <div class="tile-label">Flamme Rouge</div>
        <div class="tile-sub">View Rules →</div>
      </div>
    </a>

    <!-- SETI -->
    <a href="seti-rules-reference.html" class="tile tile-tall">
      <img class="tile-img" src="images/seti.png" alt="SETI" />
      <div class="tile-badge">Science · 1–4 Players</div>
      <div class="tile-overlay">
        <div class="tile-label">SETI</div>
        <div class="tile-sub">View Rules →</div>
      </div>
    </a>

  </main>

</body>
</html>
